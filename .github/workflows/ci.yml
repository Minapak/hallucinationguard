# Hardening per GitHub "Security hardening for GitHub Actions" and OpenSSF
# Scorecard (Pinned-Dependencies, Token-Permissions):
# - actions pinned to full commit SHAs (tags are mutable; cf. the March 2025
#   tj-actions/changed-files compromise, CVE-2025-30066 / GHSA-mrrh-fwg8-r2c3)
# - explicit least-privilege GITHUB_TOKEN scope
# - matrix tests the lowest supported Python (3.9, per README) and latest stable
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Fixture schema + certainty gates
        run: python3 tests/test_fixtures.py
      - name: Scorer unit + per-locale regression tests
        run: python3 tests/test_scorer.py
      - name: Reference scorer runs end-to-end (all 7 locales)
        run: |
          for loc in en ko ja zh-Hans es fr de; do
            python3 reference/score_v0.py fixtures/samples/hg120_sample_20.json --locale "$loc" > /dev/null
          done
      - name: Demo script runs
        run: python3 demo/metric_blindness_demo.py > /dev/null
